# Exemplo Nginx — homolog.cadbrasil.com.br (frontend TanStack + Nitro na porta 3000)
# Ajuste root, paths e nomes de upstream conforme o aaPanel.

upstream cadbrasil_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream cadbrasil_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name homolog.cadbrasil.com.br;

    # ssl_certificate ...
    # ssl_certificate_key ...

    root /www/wwwroot/sicaf-passo-a-passo/.output/public;

    # Arquivos estáticos do build (JS/CSS chunks) — servir direto do disco
    location /assets/ {
        alias /www/wwwroot/sicaf-passo-a-passo/.output/public/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* ^/(favicon\.ico|favicon\.png|favicon-16x16\.png|apple-touch-icon\.png)$ {
        access_log off;
        expires 30d;
        try_files $uri @frontend;
    }

    # API e uploads → backend Next.js
    location /api/ {
        proxy_pass http://cadbrasil_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://cadbrasil_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSR TanStack Start
    location / {
        try_files $uri @frontend;
    }

    location @frontend {
        proxy_pass http://cadbrasil_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
