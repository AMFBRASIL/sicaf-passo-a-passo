<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: system-ui, sans-serif; background: #0f1117; color: #e1e4e8; padding: 20px; }
    .logo { text-align: center; margin-bottom: 16px; }
    .logo h1 { font-size: 18px; color: #3fb950; }
    .logo p { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; transition: all .2s; }
    .btn:hover { filter: brightness(1.15); }
    .btn-green { background: #238636; color: #fff; }
    .btn-blue { background: #1f6feb; color: #fff; }
    .status { text-align: center; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 8px; }
    .status.idle { background: #21262d; color: #8b949e; }
    .status.active { background: #23863622; color: #3fb950; }
  </style>
</head>
<body>
  <div class="logo">
    <h1>🟢 CadBrasil SICAF</h1>
    <p>Assistente Digital para Credenciamento</p>
  </div>

  <button class="btn btn-green" id="btnOpen">🌐 Abrir Portal SICAF</button>
  <button class="btn btn-blue" id="btnPanel">💬 Abrir Assistente IA</button>

  <div class="status idle" id="status">SICAF não aberto</div>

  <script src="popup.js"></script>
</body>
</html>
