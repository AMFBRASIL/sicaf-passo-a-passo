<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente SICAF — CadBrasil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0f1117; }
    iframe { width: 100%; height: 100%; border: none; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 12px; color: #8b949e; font-family: system-ui, sans-serif; }
    .loading .spinner { width: 32px; height: 32px; border: 3px solid #30363d; border-top-color: #238636; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 13px; }
    .error { display: none; text-align: center; padding: 20px; color: #f85149; font-family: system-ui, sans-serif; font-size: 13px; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Carregando assistente...</p>
  </div>
  <div class="error" id="error">
    <p>⚠ Não foi possível carregar o assistente.</p>
    <p style="margin-top:8px;color:#8b949e">Verifique sua conexão com o servidor CadBrasil.</p>
  </div>
  <iframe id="chatFrame" style="display:none"></iframe>
  <script src="sidepanel.js"></script>
</body>
</html>
